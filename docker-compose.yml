services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WITH_CUDA: ${WITH_CUDA:-true}
        CUDA_ARCHS: ${CUDA_ARCHS:-120}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    container_name: llm-bawt-app
    ipc: host  # Required for vLLM multiprocess engine shared memory
    security_opt:
      - apparmor:unconfined  # AppArmor not available on this kernel; nvidia-ctk owns daemon.json
    env_file:
      - ./.env
    ports:
      - "${MCP_PORT:-8001}:8001"
      - "${SERVICE_PORT:-8642}:8642"
    volumes:
      # Mount host config directory to avoid duplication
      - ${HOME}/.config/llm-bawt:/root/.config/llm-bawt
      # Mount logs directory
      - ./.logs:/app/.logs
      # Mount bots.yaml for live updates (nextcloud provisioning, etc.)
      # - ./src/llm_bawt/bots.yaml:/app/src/llm_bawt/bots.yaml:ro  # disabled: Docker Desktop VirtioFS bug
      # Optional: mount local models
      - ${MODELS_PATH:-./models}:/app/models
      # Share host's GGUF model cache to avoid re-downloads
      - ${LLM_BAWT_MODEL_CACHE_DIR:-${HOME}/.cache/llm-bawt/models}:/root/.cache/llm-bawt/models
      # Mount HuggingFace cache for GGUF models
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "echo.lan.zenoran.com:${ECHO_LAN_HOST_IP:-10.0.0.101}"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    stdin_open: true
    tty: true

  redis:
    image: redis:7-alpine
    container_name: llm-bawt-redis
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  openclaw-bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    image: llm-bawt-bridge
    container_name: llm-bawt-openclaw-bridge
    command: ["python", "-m", "openclaw_bridge"]
    env_file:
      - ./.env
    environment:
      - OPENCLAW_WS_URL=${OPENCLAW_WS_URL:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_BRIDGE_LOG_LEVEL=${OPENCLAW_BRIDGE_LOG_LEVEL:-INFO}
      - LLM_BAWT_API_URL=http://app:8642
      - REDIS_URL=redis://redis:6379/0
      - INFLUXDB_URL=${INFLUXDB_URL:-}
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-homeassistant}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-llm-bawt}
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "echo.lan.zenoran.com:${ECHO_LAN_HOST_IP:-10.0.0.101}"
    volumes:
      - ./.logs:/app/.logs
      - ${HOME}/.config/llm-bawt:/home/bridge/.config/llm-bawt
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8680/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  claude-code-bridge:
    image: llm-bawt-bridge
    container_name: llm-bawt-claude-code-bridge
    command: ["python", "-m", "claude_code_bridge"]
    env_file:
      - ./.env
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - CLAUDE_CODE_MODEL=${CLAUDE_CODE_MODEL:-claude-sonnet-4-20250514}
      - CLAUDE_CODE_ADD_DIRS=${CLAUDE_CODE_ADD_DIRS:-}
      - CLAUDE_CODE_BRIDGE_LOG_LEVEL=${CLAUDE_CODE_BRIDGE_LOG_LEVEL:-INFO}
      - LLM_BAWT_API_URL=http://app:8642
      - REDIS_URL=redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "echo.lan.zenoran.com:${ECHO_LAN_HOST_IP:-10.0.0.101}"
    volumes:
      - ./.logs:/app/.logs
      - ${HOME}/dev:/home/bridge/dev
      - ${HOME}/.config/claude-code-bridge:/home/bridge/.claude
      - ${HOME}/dev/agent-skills:/home/bridge/.claude/skills
      - ${HOME}/.config/claude-code-bridge/.claude.json:/home/bridge/.claude.json
      - ${HOME}/.claude/.credentials.json:/home/bridge/.claude/.credentials.json
      - ${HOME}/.ssh:/home/bridge/.ssh:ro
      - ${HOME}/.config/claude-code-bridge/ssh_config:/etc/ssh/ssh_config:ro
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8681/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: llm-bawt-crawl4ai
    ports:
      - "${CRAWL4AI_PORT:-11235}:11235"
    environment:
      - CRAWL4AI_API_TOKEN=${CRAWL4AI_API_TOKEN:-}
    restart: unless-stopped

volumes:
  redis-data:
