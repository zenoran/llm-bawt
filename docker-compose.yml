services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    # GPU removed (TASK-278): in-process local inference moved to the
    # local-model-bridge service, so the app reserves no GPU device, needs no
    # ipc:host (that existed only for the vLLM multiprocess shared-memory
    # engine) and drops the nvidia-ctk apparmor opt. The app runs CPU-only.
    # Wave B: the app now builds from the dedicated CPU-only Dockerfile.app
    # (no torch / sentence-transformers / llama-cpp / vllm). local-model-bridge
    # keeps the GPU `Dockerfile`.
    container_name: llm-bawt-app
    env_file:
      - ./.env
    environment:
      # /v1/usage Claude adapter: a DEDICATED login bundle the app owns and
      # refreshes itself (mode=owned) so it never goes stale and never touches
      # your interactive Claude Code (TUI) login. Lives under the already-RW
      # ~/.config/llm-bawt mount. One-time setup in docs/usage-endpoint.md.
      - CLAUDE_USAGE_CREDENTIALS_PATH=/root/.config/llm-bawt/claude-usage/.credentials.json
      - CLAUDE_USAGE_CREDENTIALS_MODE=owned
      # TASK-277: memory embeddings now POST to the local-model-bridge /embed
      # endpoint instead of loading MiniLM in-process. On the compose network
      # the bridge is reachable by service name; no host port publish needed.
      - LOCAL_MODEL_EMBED_URL=http://local-model-bridge:8684
    ports:
      - "${MCP_PORT:-8001}:8001"
      - "${SERVICE_PORT:-8642}:8642"
    volumes:
      # Mount host config directory to avoid duplication. The /v1/usage
      # endpoint's dedicated Claude login bundle lives under this (RW) mount at
      # claude-usage/.credentials.json — the app refreshes it in place.
      - ${HOME}/.config/llm-bawt:/root/.config/llm-bawt
      # Mount logs directory
      - ./.logs:/app/.logs
      # Mount bots.yaml for live updates (nextcloud provisioning, etc.)
      # - ./src/llm_bawt/bots.yaml:/app/src/llm_bawt/bots.yaml:ro  # disabled: Docker Desktop VirtioFS bug
      # Optional: mount local models
      - ${MODELS_PATH:-./models}:/app/models
      # Share host's GGUF model cache to avoid re-downloads
      - ${LLM_BAWT_MODEL_CACHE_DIR:-${HOME}/.cache/llm-bawt/models}:/root/.cache/llm-bawt/models
      # Mount HuggingFace cache for GGUF models
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
      # Media generation storage (videos, thumbnails) — legacy MediaStorage CAS
      - ${MEDIA_STORAGE_PATH:-./storage}:/app/storage
      # MediaStore blobs (TASK-223): chat upload originals + WebP variants.
      # Lives outside ./storage so the optimizer-managed tree can grow
      # independently of legacy video/thumbnail output. Default points at the
      # echo home volume; override via LLM_BAWT_MEDIA_HOST_PATH for local dev.
      #
      # One-time host setup if the bind source is an NFS-backed Unraid share:
      # the share's NFS export uses root_squash (Unraid default), so the
      # container — which runs as root — gets mapped to nobody on the server
      # and can't write to a user-owned dir. Fix once on the host:
      #     chmod 777 /mnt/user/home/echo/llmbawt-media
      # (chmod persists on disk; the dir contents stay 755, only the parent
      # is loosened so squashed-root can mkdir blobs/. Blob files end up owned
      # by nobody:nogroup which is fine — readable by nick for backups.)
      #
      # rslave propagation: the source sits under an autofs NFS mount; if the
      # host ever unmounts/remounts it, the default (rprivate) leaves the
      # container holding a dead mount and every blob access throws ESTALE
      # until the container is recreated. rslave lets the host's remount
      # propagate in. NOTE: the Ubuntu-packaged compose (2.40.3+ds1) silently
      # drops propagation flags — the real guard on echo is the fstab change
      # that removed x-systemd.idle-timeout from /mnt/user/home, so the NFS
      # mount never idle-unmounts in the first place (2026-06-12).
      - ${LLM_BAWT_MEDIA_HOST_PATH:-/mnt/user/home/echo/llmbawt-media}:/var/lib/llm-bawt/media:rslave
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "echo.lan.zenoran.com:${ECHO_LAN_HOST_IP:-10.0.0.101}"
      - "echo:${ECHO_LAN_HOST_IP:-10.0.0.101}"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    stdin_open: true
    tty: true

  redis:
    image: redis:7-alpine
    container_name: llm-bawt-redis
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  openclaw-bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    image: llm-bawt-bridge
    container_name: llm-bawt-openclaw-bridge
    command: ["python", "-m", "openclaw_bridge"]
    env_file:
      - ./.env
    environment:
      - OPENCLAW_WS_URL=${OPENCLAW_WS_URL:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_BRIDGE_LOG_LEVEL=${OPENCLAW_BRIDGE_LOG_LEVEL:-INFO}
      - LLM_BAWT_API_URL=http://app:8642
      # Override SERVICE_HOST inherited from .env (which is 0.0.0.0 — meant
      # for the app container's bind address). From inside a bridge, the
      # service is reachable at the compose service name `app`. This lets
      # the editable `llm` CLI (installed via uv tool in Dockerfile.bridge)
      # talk to the API without a flag override.
      - LLM_BAWT_SERVICE_HOST=app
      - REDIS_URL=redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "echo.lan.zenoran.com:${ECHO_LAN_HOST_IP:-10.0.0.101}"
      - "echo:${ECHO_LAN_HOST_IP:-10.0.0.101}"
    volumes:
      - ./.logs:/app/.logs
      - ${HOME}/.config/llm-bawt:/home/bridge/.config/llm-bawt
      # Shared agent scripts (bw-secret etc.) — live, no rebuild needed
      - ${HOME}/dev/agent-skills/scripts:/opt/agent-skills/bin:ro
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8680/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  claude-code-bridge:
    image: llm-bawt-bridge
    container_name: llm-bawt-claude-code-bridge
    command: ["python", "-m", "claude_code_bridge"]
    env_file:
      - ./.env
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      # CLAUDE_CODE_MODEL intentionally not set — there is no default
      # model.  Each request carries its model, resolved from the bot's
      # default_model catalog entry (type=claude-code).  See
      # src/claude_code_bridge/bridge.py (raises on missing model).
      - CLAUDE_CODE_BRIDGE_LOG_LEVEL=${CLAUDE_CODE_BRIDGE_LOG_LEVEL:-INFO}
      - LLM_BAWT_API_URL=http://app:8642
      # Override SERVICE_HOST inherited from .env (which is 0.0.0.0 — meant
      # for the app container's bind address). From inside a bridge, the
      # service is reachable at the compose service name `app`. This lets
      # the editable `llm` CLI (installed via uv tool in Dockerfile.bridge)
      # talk to the API without a flag override.
      - LLM_BAWT_SERVICE_HOST=app
      - REDIS_URL=redis://redis:6379/0
      # TASK-270: TASK-270 proxy reads ChatGPT subscription OAuth from
      # ~/.codex/auth.json (the artifact `codex login` produces). Same
      # bind-mount the codex-bridge uses so a single `codex login` on the
      # host re-credentials both bridges.
      - CODEX_AUTH_PATH=/home/bridge/.codex/auth.json
      # Z.AI (Zhipu GLM) — native Anthropic Messages API passthrough.
      # Powers bots whose model_id is namespaced "zai/<glm-model>".
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - ENABLE_TOOL_SEARCH=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "echo.lan.zenoran.com:${ECHO_LAN_HOST_IP:-10.0.0.101}"
      - "echo:${ECHO_LAN_HOST_IP:-10.0.0.101}"
    volumes:
      - ./.logs:/app/.logs
      - ${HOME}/dev:/home/bridge/dev
      - ${HOME}/.config/claude-code-bridge:/home/bridge/.claude
      - ${HOME}/dev/agent-skills:/home/bridge/.claude/skills
      - ${HOME}/.config/claude-code-bridge/.claude.json:/home/bridge/.claude.json
      # Bridge SSH identity. Default = the host operator's ~/.ssh (echo today,
      # for non-GitHub SSH targets). NOTE: tenant GitHub auth no longer relies on
      # a hand-made deploy key — it uses the provider-connect git credential
      # helper (device-flow GitHub App → auto-refreshing installation tokens over
      # HTTPS). Wire it with `tenant.sh bridge-git-setup`. BRIDGE_SSH_DIR remains
      # available for any non-GitHub SSH remotes a bridge still needs.
      - ${BRIDGE_SSH_DIR:-${HOME}/.ssh}:/home/bridge/.ssh:ro
      - ${HOME}/.config/claude-code-bridge/ssh_config:/etc/ssh/ssh_config:ro
      # TASK-270 proxy reads/refreshes the ChatGPT OAuth bundle here.
      # RW so the proxy can persist refreshed tokens; same inode as the
      # codex-bridge mount so both stay in lockstep.
      - ${HOME}/.codex/auth.json:/home/bridge/.codex/auth.json
      # Shared agent scripts (bw-secret etc.) — live, no rebuild needed
      - ${HOME}/dev/agent-skills/scripts:/opt/agent-skills/bin:ro
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8681/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  codex-bridge:
    image: llm-bawt-bridge
    container_name: llm-bawt-codex-bridge
    command: ["python", "-m", "codex_bridge"]
    env_file:
      - ./.env
    environment:
      - CODEX_HOME=/home/bridge/.codex
      - CODEX_AUTH_PATH=/home/bridge/.codex/auth.json
      - CODEX_MODEL=${CODEX_MODEL:-gpt-5.4}
      - CODEX_BACKEND_NAME=${CODEX_BACKEND_NAME:-codex}
      - CODEX_BRIDGE_LOG_LEVEL=${CODEX_BRIDGE_LOG_LEVEL:-INFO}
      - CODEX_BRIDGE_HEALTH_PORT=8682
      - CODEX_BRIDGE_REQUEST_TIMEOUT=${CODEX_BRIDGE_REQUEST_TIMEOUT:-900}
      - CODEX_BRIDGE_CWD=${CODEX_BRIDGE_CWD:-/home/bridge/dev}
      - CODEX_LOCAL_PLUGINS_ENABLED=${CODEX_LOCAL_PLUGINS_ENABLED:-1}
      - CODEX_LOCAL_PLUGINS_SRC=${CODEX_LOCAL_PLUGINS_SRC:-/home/bridge/dev/agent-skills/codex}
      - CODEX_DEV_ROOT=${CODEX_DEV_ROOT:-/home/bridge/dev}
      - LLM_BAWT_API_URL=http://app:8642
      # Override SERVICE_HOST inherited from .env (which is 0.0.0.0 — meant
      # for the app container's bind address). From inside a bridge, the
      # service is reachable at the compose service name `app`. This lets
      # the editable `llm` CLI (installed via uv tool in Dockerfile.bridge)
      # talk to the API without a flag override.
      - LLM_BAWT_SERVICE_HOST=app
      - REDIS_URL=redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "echo.lan.zenoran.com:${ECHO_LAN_HOST_IP:-10.0.0.101}"
      - "echo:${ECHO_LAN_HOST_IP:-10.0.0.101}"
    volumes:
      - ./.logs:/app/.logs
      - ${HOME}/dev:/home/bridge/dev
      # OAuth bundle is bind-mounted RW so codex can self-refresh tokens.
      # `codex login` on the host writes back to this same inode and the
      # bridge picks up the new tokens on the next turn — no restart needed.
      - ${HOME}/.codex/auth.json:/home/bridge/.codex/auth.json
      - ${HOME}/.codex/config.toml:/home/bridge/.codex/config.toml
      - ${HOME}/.codex/sessions:/home/bridge/.codex/sessions
      # Bridge SSH identity. Default = the host operator's ~/.ssh (echo today,
      # for non-GitHub SSH targets). NOTE: tenant GitHub auth no longer relies on
      # a hand-made deploy key — it uses the provider-connect git credential
      # helper (device-flow GitHub App → auto-refreshing installation tokens over
      # HTTPS). Wire it with `tenant.sh bridge-git-setup`. BRIDGE_SSH_DIR remains
      # available for any non-GitHub SSH remotes a bridge still needs.
      - ${BRIDGE_SSH_DIR:-${HOME}/.ssh}:/home/bridge/.ssh:ro
      # The openai-codex-sdk wheel ships without the codex Rust binary;
      # bind-mount the host's @openai/codex npm package vendor dir so
      # the SDK's find_codex_path picks up the static-pie musl binary.
      - ${HOME}/.npm-global/lib/node_modules/@openai/codex/node_modules/@openai/codex-linux-x64/vendor:/app/.venv/lib/python3.12/site-packages/openai_codex_sdk/vendor:ro
      # Shared agent scripts (bw-secret etc.) — live, no rebuild needed
      - ${HOME}/dev/agent-skills/scripts:/opt/agent-skills/bin:ro
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8682/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  local-model-bridge:
    # TASK-276: local GPU inference (gguf via llama-cpp + vLLM) runs here,
    # OUT of the main app process. A CUDA abort() in local inference calls
    # abort() on the whole process — isolating it here means it can only kill
    # this bridge, never the app/MCP/agent sessions. Uses the GPU image
    # (reuses the app Dockerfile + CUDA build args) since it needs llama_cpp /
    # vllm / torch; the other bridges run the CPU-only llm-bawt-bridge image.
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WITH_CUDA: ${WITH_CUDA:-true}
        CUDA_ARCHS: ${CUDA_ARCHS:-120}
    image: llm-bawt-local-model-bridge
    container_name: llm-bawt-local-model-bridge
    command: ["python", "-m", "local_model_bridge"]
    # GPU lives here, not on the app: TASK-278 removed the GPU reservation +
    # ipc:host from the app service; this bridge owns all local inference.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host  # Required for vLLM multiprocess engine shared memory
    security_opt:
      - apparmor:unconfined  # AppArmor not available on this kernel; nvidia-ctk owns daemon.json
    env_file:
      - ./.env
    environment:
      - LOCAL_MODEL_BACKEND_NAME=${LOCAL_MODEL_BACKEND_NAME:-local}
      - LOCAL_MODEL_BRIDGE_LOG_LEVEL=${LOCAL_MODEL_BRIDGE_LOG_LEVEL:-INFO}
      - LOCAL_MODEL_BRIDGE_HEALTH_PORT=8683
      # TASK-277: MiniLM embedding API (the app POSTs here). CPU by default —
      # MiniLM is tiny and this keeps embeddings off the contended GPU and
      # independent of NVML/CUDA state.
      - LOCAL_MODEL_BRIDGE_EMBED_PORT=8684
      - LOCAL_MODEL_EMBED_DEVICE=${LOCAL_MODEL_EMBED_DEVICE:-cpu}
      - LOCAL_MODEL_BRIDGE_REQUEST_TIMEOUT=${LOCAL_MODEL_BRIDGE_REQUEST_TIMEOUT:-1800}
      # Load all layers onto the GPU by default (matches the app's prior local
      # inference behavior).
      - LLAMA_CPP_N_GPU_LAYERS=-1
      # RTX 5080 / Blackwell sm_120: enable the "full" SM120 feature set so
      # FlashInfer's GEMM/attention kernels work (the "f" suffix). Without this,
      # vLLM hits "CUDA error: an illegal memory access" on load. See vLLM
      # issues #30707 / #35566.
      - FLASHINFER_CUDA_ARCH_LIST=12.0f
      # sm_120 has no prebuilt FlashInfer sampling kernel and the runtime image
      # has no C/CUDA toolchain to JIT-compile one (ninja build fails code=127).
      # Use vLLM's native Torch sampler instead — no compile needed.
      - VLLM_USE_FLASHINFER_SAMPLER=0
      # Reduce CUDA allocator fragmentation on the 16GB card (vLLM warmup OOM).
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - LLM_BAWT_API_URL=http://app:8642
      # Override SERVICE_HOST inherited from .env (which is 0.0.0.0 — the app
      # container's bind address). From inside a bridge the service is reachable
      # at the compose service name `app`.
      - LLM_BAWT_SERVICE_HOST=app
      - REDIS_URL=redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "echo.lan.zenoran.com:${ECHO_LAN_HOST_IP:-10.0.0.101}"
      - "echo:${ECHO_LAN_HOST_IP:-10.0.0.101}"
    volumes:
      # Mirror the app service's model-related volumes so the bridge resolves
      # and downloads the same GGUF/HF artifacts.
      - ${HOME}/.config/llm-bawt:/root/.config/llm-bawt
      - ./.logs:/app/.logs
      # Local models
      - ${MODELS_PATH:-./models}:/app/models
      # Share host's GGUF model cache to avoid re-downloads
      - ${LLM_BAWT_MODEL_CACHE_DIR:-${HOME}/.cache/llm-bawt/models}:/root/.cache/llm-bawt/models
      # HuggingFace cache (HF_HOME) for GGUF / vLLM model downloads
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8683/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      # Model loads are slow (GGUF download + CUDA graph compile can take
      # minutes); give the bridge a generous grace period before the
      # healthcheck starts failing the container.
      start_period: 180s

  playwright-mcp:
    image: mcp/playwright
    container_name: llm-bawt-playwright-mcp
    # Token-cost guard:
    #   --snapshot-mode=none — stops the MCP server from bundling the full
    #     accessibility tree onto EVERY action result. The auto-snapshot was
    #     the O(n²) budget incinerator: every navigate/click/screenshot would
    #     append 50–200 KB of structured text to the tool result, then re-sent
    #     each iteration. Agents can still call browser_snapshot explicitly
    #     when they actually want the tree.
    #   --viewport-size=1280x720 — caps screenshot dimensions (~2,500 image
    #     tokens vs ~10K for retina-default). Loopy's playwright work was
    #     vaporizing budget in 2hr windows before these were set; see 2026-05-13
    #     chat + TASK-218 (lifecycle resilience).
    command: ["--headless", "--no-sandbox", "--isolated", "--port", "8931", "--host", "0.0.0.0", "--allowed-hosts", "*", "--snapshot-mode", "none", "--viewport-size", "1280x720"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "echo.lan.zenoran.com:${ECHO_LAN_HOST_IP:-10.0.0.101}"
      - "echo:${ECHO_LAN_HOST_IP:-10.0.0.101}"
    tmpfs:
      - /home/bridge:uid=1000,gid=1000
    restart: unless-stopped

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: llm-bawt-crawl4ai
    ports:
      - "${CRAWL4AI_PORT:-11235}:11235"
    environment:
      - CRAWL4AI_API_TOKEN=${CRAWL4AI_API_TOKEN:-}
    restart: unless-stopped

volumes:
  redis-data:
