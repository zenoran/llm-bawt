services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WITH_CUDA: ${WITH_CUDA:-true}
        CUDA_ARCHS: ${CUDA_ARCHS:-120}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    container_name: llm-bawt-app
    ipc: host  # Required for vLLM multiprocess engine shared memory
    security_opt:
      - apparmor:unconfined  # AppArmor not available on this kernel; nvidia-ctk owns daemon.json
    env_file:
      - ./.env
    ports:
      - "${MCP_PORT:-8001}:8001"
      - "${SERVICE_PORT:-8642}:8642"
    volumes:
      # Mount host config directory to avoid duplication
      - ${HOME}/.config/llm-bawt:/root/.config/llm-bawt
      # Mount logs directory
      - ./.logs:/app/.logs
      # Mount bots.yaml for live updates (nextcloud provisioning, etc.)
      # - ./src/llm_bawt/bots.yaml:/app/src/llm_bawt/bots.yaml:ro  # disabled: Docker Desktop VirtioFS bug
      # Optional: mount local models
      - ${MODELS_PATH:-./models}:/app/models
      # Share host's GGUF model cache to avoid re-downloads
      - ${LLM_BAWT_MODEL_CACHE_DIR:-${HOME}/.cache/llm-bawt/models}:/root/.cache/llm-bawt/models
      # Mount HuggingFace cache for GGUF models
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
      # Media generation storage (videos, thumbnails)
      - ${MEDIA_STORAGE_PATH:-./storage}:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "echo.lan.zenoran.com:${ECHO_LAN_HOST_IP:-10.0.0.101}"
      - "echo:${ECHO_LAN_HOST_IP:-10.0.0.101}"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    stdin_open: true
    tty: true

  redis:
    image: redis:7-alpine
    container_name: llm-bawt-redis
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  openclaw-bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    image: llm-bawt-bridge
    container_name: llm-bawt-openclaw-bridge
    command: ["python", "-m", "openclaw_bridge"]
    env_file:
      - ./.env
    environment:
      - OPENCLAW_WS_URL=${OPENCLAW_WS_URL:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_BRIDGE_LOG_LEVEL=${OPENCLAW_BRIDGE_LOG_LEVEL:-INFO}
      - LLM_BAWT_API_URL=http://app:8642
      # Override SERVICE_HOST inherited from .env (which is 0.0.0.0 — meant
      # for the app container's bind address). From inside a bridge, the
      # service is reachable at the compose service name `app`. This lets
      # the editable `llm` CLI (installed via pipx in Dockerfile.bridge)
      # talk to the API without a flag override.
      - LLM_BAWT_SERVICE_HOST=app
      - REDIS_URL=redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "echo.lan.zenoran.com:${ECHO_LAN_HOST_IP:-10.0.0.101}"
      - "echo:${ECHO_LAN_HOST_IP:-10.0.0.101}"
    volumes:
      - ./.logs:/app/.logs
      - ${HOME}/.config/llm-bawt:/home/bridge/.config/llm-bawt
      # Shared agent scripts (bw-secret etc.) — live, no rebuild needed
      - ${HOME}/dev/agent-skills/scripts:/opt/agent-skills/bin:ro
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8680/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  claude-code-bridge:
    image: llm-bawt-bridge
    container_name: llm-bawt-claude-code-bridge
    command: ["python", "-m", "claude_code_bridge"]
    env_file:
      - ./.env
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - CLAUDE_CODE_MODEL=${CLAUDE_CODE_MODEL:-claude-sonnet-4-20250514}
      - CLAUDE_CODE_BRIDGE_LOG_LEVEL=${CLAUDE_CODE_BRIDGE_LOG_LEVEL:-INFO}
      - LLM_BAWT_API_URL=http://app:8642
      # Override SERVICE_HOST inherited from .env (which is 0.0.0.0 — meant
      # for the app container's bind address). From inside a bridge, the
      # service is reachable at the compose service name `app`. This lets
      # the editable `llm` CLI (installed via pipx in Dockerfile.bridge)
      # talk to the API without a flag override.
      - LLM_BAWT_SERVICE_HOST=app
      - REDIS_URL=redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "echo.lan.zenoran.com:${ECHO_LAN_HOST_IP:-10.0.0.101}"
      - "echo:${ECHO_LAN_HOST_IP:-10.0.0.101}"
    volumes:
      - ./.logs:/app/.logs
      - ${HOME}/dev:/home/bridge/dev
      - ${HOME}/.config/claude-code-bridge:/home/bridge/.claude
      - ${HOME}/dev/agent-skills:/home/bridge/.claude/skills
      - ${HOME}/.config/claude-code-bridge/.claude.json:/home/bridge/.claude.json
      - ${HOME}/.ssh:/home/bridge/.ssh:ro
      - ${HOME}/.config/claude-code-bridge/ssh_config:/etc/ssh/ssh_config:ro
      # Shared agent scripts (bw-secret etc.) — live, no rebuild needed
      - ${HOME}/dev/agent-skills/scripts:/opt/agent-skills/bin:ro
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8681/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  codex-bridge:
    image: llm-bawt-bridge
    container_name: llm-bawt-codex-bridge
    command: ["python", "-m", "codex_bridge"]
    env_file:
      - ./.env
    environment:
      - CODEX_HOME=/home/bridge/.codex
      - CODEX_AUTH_PATH=/home/bridge/.codex/auth.json
      - CODEX_MODEL=${CODEX_MODEL:-gpt-5.4}
      - CODEX_BACKEND_NAME=${CODEX_BACKEND_NAME:-codex}
      - CODEX_BRIDGE_LOG_LEVEL=${CODEX_BRIDGE_LOG_LEVEL:-INFO}
      - CODEX_BRIDGE_HEALTH_PORT=8682
      - CODEX_BRIDGE_REQUEST_TIMEOUT=${CODEX_BRIDGE_REQUEST_TIMEOUT:-900}
      - CODEX_BRIDGE_CWD=${CODEX_BRIDGE_CWD:-/home/bridge/dev}
      - CODEX_LOCAL_PLUGINS_ENABLED=${CODEX_LOCAL_PLUGINS_ENABLED:-1}
      - CODEX_LOCAL_PLUGINS_SRC=${CODEX_LOCAL_PLUGINS_SRC:-/home/bridge/dev/agent-skills/codex}
      - CODEX_DEV_ROOT=${CODEX_DEV_ROOT:-/home/bridge/dev}
      - LLM_BAWT_API_URL=http://app:8642
      # Override SERVICE_HOST inherited from .env (which is 0.0.0.0 — meant
      # for the app container's bind address). From inside a bridge, the
      # service is reachable at the compose service name `app`. This lets
      # the editable `llm` CLI (installed via pipx in Dockerfile.bridge)
      # talk to the API without a flag override.
      - LLM_BAWT_SERVICE_HOST=app
      - REDIS_URL=redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "echo.lan.zenoran.com:${ECHO_LAN_HOST_IP:-10.0.0.101}"
      - "echo:${ECHO_LAN_HOST_IP:-10.0.0.101}"
    volumes:
      - ./.logs:/app/.logs
      - ${HOME}/dev:/home/bridge/dev
      # OAuth bundle is bind-mounted RW so codex can self-refresh tokens.
      # `codex login` on the host writes back to this same inode and the
      # bridge picks up the new tokens on the next turn — no restart needed.
      - ${HOME}/.codex/auth.json:/home/bridge/.codex/auth.json
      - ${HOME}/.codex/config.toml:/home/bridge/.codex/config.toml
      - ${HOME}/.codex/sessions:/home/bridge/.codex/sessions
      - ${HOME}/.ssh:/home/bridge/.ssh:ro
      # The openai-codex-sdk wheel ships without the codex Rust binary;
      # bind-mount the host's @openai/codex npm package vendor dir so
      # the SDK's find_codex_path picks up the static-pie musl binary.
      - ${HOME}/.npm-global/lib/node_modules/@openai/codex/node_modules/@openai/codex-linux-x64/vendor:/app/.venv/lib/python3.12/site-packages/openai_codex_sdk/vendor:ro
      # Shared agent scripts (bw-secret etc.) — live, no rebuild needed
      - ${HOME}/dev/agent-skills/scripts:/opt/agent-skills/bin:ro
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8682/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  playwright-mcp:
    image: mcp/playwright
    container_name: llm-bawt-playwright-mcp
    # Token-cost guard:
    #   --snapshot-mode=none — stops the MCP server from bundling the full
    #     accessibility tree onto EVERY action result. The auto-snapshot was
    #     the O(n²) budget incinerator: every navigate/click/screenshot would
    #     append 50–200 KB of structured text to the tool result, then re-sent
    #     each iteration. Agents can still call browser_snapshot explicitly
    #     when they actually want the tree.
    #   --viewport-size=1280x720 — caps screenshot dimensions (~2,500 image
    #     tokens vs ~10K for retina-default). Loopy's playwright work was
    #     vaporizing budget in 2hr windows before these were set; see 2026-05-13
    #     chat + TASK-218 (lifecycle resilience).
    command: ["--headless", "--no-sandbox", "--isolated", "--port", "8931", "--host", "0.0.0.0", "--allowed-hosts", "*", "--snapshot-mode", "none", "--viewport-size", "1280x720"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "echo.lan.zenoran.com:${ECHO_LAN_HOST_IP:-10.0.0.101}"
      - "echo:${ECHO_LAN_HOST_IP:-10.0.0.101}"
    tmpfs:
      - /home/bridge:uid=1000,gid=1000
    restart: unless-stopped

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: llm-bawt-crawl4ai
    ports:
      - "${CRAWL4AI_PORT:-11235}:11235"
    environment:
      - CRAWL4AI_API_TOKEN=${CRAWL4AI_API_TOKEN:-}
    restart: unless-stopped

volumes:
  redis-data:
